<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pika Verse - Diamond Hand Analyzer</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --accent: #f0b90b; --success: #238636; --text: #c9d1d9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 40px; }
        .container { max-width: 900px; margin: auto; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); }
        h2 { color: var(--accent); text-align: center; margin-bottom: 10px; }
        p.description { text-align: center; color: #8b949e; margin-bottom: 25px; }
        textarea { width: 100%; height: 150px; background: var(--bg); color: #58a6ff; border: 1px solid var(--border); border-radius: 8px; padding: 15px; box-sizing: border-box; font-family: monospace; }
        .btn-group { display: flex; gap: 10px; margin: 20px 0; }
        button { flex: 1; background: var(--success); color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        button.download-btn { background: #30363d; }
        #status { margin-top: 10px; color: var(--accent); font-weight: bold; text-align: center; }
        .results-table { width: 100%; margin-top: 25px; border-collapse: collapse; }
        .results-table th, .results-table td { border: 1px solid var(--border); padding: 12px; text-align: left; font-size: 14px; }
        .results-table th { background: #21262d; color: var(--accent); }
        .gtd { border-left: 4px solid var(--success); background: rgba(35, 134, 54, 0.1); }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-gtd { background: var(--success); color: white; }
        .badge-wl { background: #484f58; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>THE PIKA VERSE</h2>
    <p class="description">Filtering GTD Members based on Wallet Activity and Holding Trust (Diamond Hands).</p>

    <textarea id="addressInput" placeholder="Paste wallet addresses from Google Sheet (One per line)..."></textarea>
    
    <div class="btn-group">
        <button onclick="analyzeWallets()">Analyze Holding Trust</button>
        <button class="download-btn" onclick="downloadCSV()">Download Result (CSV)</button>
    </div>

    <div id="status"></div>

    <table class="results-table" id="resultsTable" style="display: none;">
        <thead>
            <tr>
                <th>Wallet Address</th>
                <th>Transaction Count</th>
                <th>Activity Score</th>
                <th>Final Status</th>
            </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
    </table>
</div>

<script>
    // Using Base Network RPC
    const RPC_URL = "https://mainnet.base.org"; 

    async function analyzeWallets() {
        const input = document.getElementById('addressInput').value.trim();
        const addresses = input.split('\n').map(a => a.trim()).filter(a => a.startsWith('0x'));
        const statusDiv = document.getElementById('status');
        const tbody = document.getElementById('resultsBody');
        const table = document.getElementById('resultsTable');

        if (addresses.length === 0) {
            alert("Please provide valid wallet addresses.");
            return;
        }

        statusDiv.innerText = "Analyzing blockchain activity... Please wait.";
        tbody.innerHTML = "";
        table.style.display = "table";

        for (let wallet of addresses) {
            try {
                // Fetch Transaction Count (Nonce)
                // A higher transaction count indicates a long-term user/holder.
                const response = await fetch(RPC_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ jsonrpc: "2.0", id: 1, method: "eth_getTransactionCount", params: [wallet, "latest"] })
                });
                const data = await response.json();
                const txCount = parseInt(data.result, 16);

                // Logic: 
                // We assume wallets with > 300 transactions are "Real Users/Holders" (GTD)
                // Wallets with < 300 transactions are "Potential Flippers/New Wallets" (WL)
                let isDiamondHand = txCount >= 300; 
                let status = isDiamondHand ? "GTD ACCESS" : "WL FCFS";
                let score = txCount > 1000 ? "Elite Holder" : txCount > 300 ? "Trusted Holder" : "Low Activity";

                const row = `
                    <tr class="${isDiamondHand ? 'gtd' : ''}">
                        <td>${wallet}</td>
                        <td>${txCount}</td>
                        <td>${score}</td>
                        <td><span class="badge ${isDiamondHand ? 'badge-gtd' : 'badge-wl'}">${status}</span></td>
                    </tr>
                `;
                tbody.innerHTML += row;

            } catch (err) {
                console.error("Error fetching data for:", wallet);
            }
        }
        statusDiv.innerText = "Analysis Complete!";
    }

    function downloadCSV() {
        let csv = "Wallet Address,Tx Count,Score,Status\n";
        const rows = document.querySelectorAll("#resultsBody tr");
        rows.forEach(row => {
            const cols = row.querySelectorAll("td");
            csv += Array.from(cols).map(c => c.innerText).join(",") + "\n";
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'PikaVerse_Filtered_List.csv';
        a.click();
    }
</script>

</body>
</html>
