<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Scanner - The Pika Verse</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #f0b90b; --success: #238636; --border: #30363d; --text: #c9d1d9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 40px; margin: 0; }
        .container { max-width: 850px; margin: auto; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); }
        h2 { color: var(--accent); text-align: center; text-transform: uppercase; }
        textarea { width: 100%; height: 150px; background: #010409; color: #58a6ff; border: 1px solid var(--border); border-radius: 8px; padding: 15px; box-sizing: border-box; font-family: monospace; margin-bottom: 20px; }
        button { width: 100%; background: var(--success); color: white; border: none; padding: 16px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #status { margin-top: 15px; text-align: center; color: var(--accent); font-weight: bold; }
        table { width: 100%; margin-top: 25px; border-collapse: collapse; display: none; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: left; }
        th { background: #21262d; color: var(--accent); }
        .gtd { background: rgba(35, 134, 54, 0.2); font-weight: bold; color: #39d353; }
    </style>
</head>
<body>

<div class="container">
    <h2>THE PIKA VERSE</h2>
    <p style="text-align: center; color: #8b949e;">Elite GTD Filter (100+ TX & 50+ NFTs)</p>

    <textarea id="wallets" placeholder="Paste addresses from Google Sheet here..."></textarea>
    <button onclick="runAnalysis()">Analyze Elite Status</button>
    <div id="status">Ready to Scan</div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>Address</th>
                <th>TX Count</th>
                <th>NFTs</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // আপনার API Key এখানে সেট করা আছে
    const API_URL = "https://base-mainnet.g.alchemy.com/v2/DkJDOSeBP-STyR6ZoyUTM";

    async function runAnalysis() {
        const input = document.getElementById('wallets').value.trim();
        const addresses = input.split('\n').map(a => a.trim()).filter(a => a.startsWith('0x'));
        const status = document.getElementById('status');
        const tbody = document.getElementById('tableBody');
        const table = document.getElementById('resultTable');

        if (addresses.length === 0) {
            alert("Please paste valid wallet addresses.");
            return;
        }

        status.innerText = "Scanning Blockchain... This may take a few seconds.";
        tbody.innerHTML = "";
        table.style.display = "table";

        for (let wallet of addresses) {
            try {
                // ১. সরাসরি Fetch কল (Batch Request)
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify([
                        { jsonrpc: "2.0", id: 1, method: "eth_getTransactionCount", params: [wallet, "latest"] },
                        { jsonrpc: "2.0", id: 2, method: "alchemy_getNFTs", params: [wallet] }
                    ])
                });

                if (!response.ok) throw new Error("API Limit or Blocked");

                const data = await response.json();
                
                const txCount = parseInt(data[0].result, 16);
                const nftCount = data[1].result.ownedNfts ? data[1].result.ownedNfts.length : 0;

                // লজিক: ১০০+ ট্রানজ্যাকশন এবং ৫০+ এনএফটি
                const isElite = (txCount >= 100 && nftCount >= 50);
                const finalStatus = isElite ? "GTD ACCESS" : "WL FCFS";

                const row = `<tr class="${isElite ? 'gtd' : ''}">
                    <td>${wallet.substring(0,10)}...${wallet.slice(-8)}</td>
                    <td>${txCount}</td>
                    <td>${nftCount}</td>
                    <td>${finalStatus}</td>
                </tr>`;
                
                tbody.innerHTML += row;
                status.innerText = `Analyzing: ${wallet.substring(0,8)}...`;

            } catch (err) {
                console.error(err);
                status.innerText = "Error: API blocked or invalid Key. Check Console (F12).";
            }
        }
        status.innerText = "Analysis Complete!";
    }
</script>

</body>
</html>
